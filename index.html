<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPNA Project Board</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- SortableJS for Drag and Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <!-- Login Overlay -->
    <div id="login-overlay" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <div class="modal-header" style="justify-content: center; border-bottom: none;">
                <h2>Qui êtes-vous ?</h2>
            </div>
            <div class="modal-body">
                <div class="user-grid">
                    <button class="user-btn" data-name="Valentin">
                        <div class="avatar">V</div> Valentin
                    </button>
                    <button class="user-btn" data-name="Hayk">
                        <div class="avatar" style="background: #3b82f6;">H</div> Hayk
                    </button>
                    <button class="user-btn" data-name="Ihor">
                        <div class="avatar" style="background: #10b981;">I</div> Ihor
                    </button>
                    <button class="user-btn" data-name="Jean-Paul">
                        <div class="avatar" style="background: #f59e0b;">J</div> Jean-Paul
                    </button>
                    <button class="user-btn" data-name="Jeremy">
                        <div class="avatar" style="background: #8b5cf6;">J</div> Jérémy
                    </button>
                    <button class="user-btn" data-name="Vely">
                        <div class="avatar" style="background: #ec4899;">V</div> Vely
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="app-container" id="main-app" style="display: none;">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <h2>RPNA Board</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-target="view-board">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                    Tableau
                </a>
                <a href="#" class="nav-item" data-target="view-planning">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    Planification
                </a>
                <a href="#" class="nav-item" data-target="view-doc">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Documentation
                </a>
                <a href="#" class="nav-item" data-target="view-settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Paramètres
                </a>
            </nav>
            <div class="sidebar-bottom">
                <button id="add-task-btn" class="btn btn-primary w-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Nouvelle Tâche
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>Projet RPNA - Sprint Actuel</h1>
                </div>
                <div class="header-right">
                    <div class="search-bar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" placeholder="Rechercher une tâche...">
                    </div>
                    
                    <div class="toggle-container" style="display: flex; align-items: center; gap: 0.5rem; margin-right: 1rem;">
                        <span style="font-size: 0.85rem; color: var(--text-muted);">Voir toute l'équipe</span>
                        <label class="switch">
                            <input type="checkbox" id="show-all-toggle">
                            <span class="slider round"></span>
                        </label>
                    </div>

                    <div class="user-profile" id="logout-btn" title="Déconnexion" style="cursor: pointer;">
                        <div class="avatar" id="current-user-avatar">?</div>
                    </div>
                </div>
            </header>

            <div class="board-container">
                <!-- Kanban Columns will be injected here by JS -->
                <div id="kanban-board" class="kanban-board"></div>
            </div>
        </main>
    </div>

    <!-- Add Task Modal -->
    <div id="task-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Nouvelle Tâche</h2>
                <button id="close-modal" class="btn-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <form id="task-form" class="modal-body">
                <input type="hidden" id="task-id">
                
                <div class="form-group">
                    <label for="task-title">Titre de la tâche</label>
                    <input type="text" id="task-title" required placeholder="Ex: Faire le MCD...">
                </div>

                <div class="form-group">
                    <label for="task-desc">Description</label>
                    <textarea id="task-desc" rows="4" placeholder="Détails de la tâche..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="task-status">Statut</label>
                        <select id="task-status">
                            <option value="todo">À faire</option>
                            <option value="in-progress">En cours</option>
                            <option value="review">En révision</option>
                            <option value="done">Terminé</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="task-priority">Priorité</label>
                        <select id="task-priority">
                            <option value="low">Basse</option>
                            <option value="medium" selected>Moyenne</option>
                            <option value="high">Haute</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="task-category">Catégorie</label>
                        <input type="text" id="task-category" placeholder="Ex: Base de données">
                    </div>
                    <div class="form-group">
                        <label for="task-assignee">Assigné à</label>
                        <input type="text" id="task-assignee" placeholder="Ex: Valentin">
                    </div>
                </div>
            </form>
            <div class="modal-footer">
                <button id="cancel-task-btn" class="btn btn-secondary">Annuler</button>
                <button type="submit" form="task-form" class="btn btn-primary">Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="main.js"></script>
</body>
</html>
